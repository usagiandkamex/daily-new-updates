name: connpass イベント情報 機能検証

on:
  workflow_dispatch:
    inputs:
      months:
        description: '検証する過去の月数（デフォルト: 3）'
        required: false
        default: '3'
        type: string

permissions:
  contents: read

jobs:
  verify-connpass-events:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: pip install -r scripts/requirements.txt

      - name: connpass イベント情報 機能検証
        env:
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
        run: |
          python scripts/verify_connpass_events.py --months ${{ github.event.inputs.months || '3' }}
